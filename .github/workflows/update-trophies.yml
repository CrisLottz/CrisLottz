name: Update GitHub Trophies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Trophies
        uses: ryo-ma/github-profile-trophy@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: CrisLottz # Añadimos explícitamente tu usuario
          theme: dracula

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Forzamos la creación del archivo directamente en la raíz para evitar fallos de directorios faltantes
          git add github-profile-trophy.svg || true
          git commit -m "Update profile trophies with private data" || exit 0
          git push
